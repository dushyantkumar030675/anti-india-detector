# Render blueprint for the backend API, worker, PostgreSQL, and Redis.
# Deploy the React frontend separately on Vercel with VITE_API_BASE_URL set to the Render API URL.

databases:
  - name: anti-india-postgres
    plan: free
    databaseName: antiindia_db
    user: antiindia
    postgresMajorVersion: "17"

services:
  - name: anti-india-redis
    type: redis
    plan: free
    ipAllowList: []

  - name: anti-india-api
    type: web
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: anti-india-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: anti-india-redis
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
      - key: BOOTSTRAP_API_KEY
        sync: false

  - name: anti-india-analysis-worker
    type: worker
    runtime: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python workers/analysis_worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: anti-india-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: anti-india-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: anti-india-api
          envVarKey: SECRET_KEY
      - key: API_KEY_SALT
        fromService:
          type: web
          name: anti-india-api
          envVarKey: API_KEY_SALT
      - key: BOOTSTRAP_API_KEY
        fromService:
          type: web
          name: anti-india-api
          envVarKey: BOOTSTRAP_API_KEY
