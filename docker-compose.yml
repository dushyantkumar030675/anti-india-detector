version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: antiindia_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data

  api:
    build: ./backend
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: ./backend/.env
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: python workers/analysis_worker.py
    env_file: ./backend/.env
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  pg_data:
  es_data:
